<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Редагувати книгу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { max-width: 600px; margin: 50px auto; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4">
            <h2 class="mb-4 text-center">📝 Редагування книги</h2>
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    {{ form.as_p }}
                </div>
                
                <div class="d-flex justify-content-between">
                    <a href="{% url 'book_list' %}" class="btn btn-outline-secondary">Скасувати</a>
                    <button type="submit" class="btn btn-primary">Зберегти зміни</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
