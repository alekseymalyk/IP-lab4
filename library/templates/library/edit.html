{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% translate "Редагувати книгу" %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            padding: 3rem 0;
        }
        .form-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            max-width: 650px;
            margin: 0 auto;
        }
        .form-control, .form-select, textarea {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            margin-bottom: 0.5rem;
        }
        .btn-custom {
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-save {
            background-color: #f59e0b;
            color: white;
            border: none;
        }
        .btn-save:hover {
            background-color: #d97706;
            transform: translateY(-1px);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a href="{% url 'book_list' %}" class="btn btn-light btn-sm rounded-circle">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h2 class="fw-bold m-0">{% translate "Редагування книги" %}</h2>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    {{ form.as_p }}
                </div>
                
                <div class="d-flex justify-content-end gap-3 mt-4 pt-3 border-top">
                    <a href="{% url 'book_list' %}" class="btn btn-light btn-custom">
                        {% translate "Скасувати" %}
                    </a>
                    <button type="submit" class="btn btn-save btn-custom">
                        <i class="bi bi-save me-2"></i> {% translate "Зберегти зміни" %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
