<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бібліотека - Список книг</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 50px; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-primary">📚 Наша Бібліотека</h2>
                <a href="{% url 'create_book' %}" class="btn btn-success">+ Додати нову книгу</a>
            </div>

            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Назва</th>
                        <th>Автор</th>
                        <th>Рік</th>
                        <th>Жанр</th>
                        <th class="text-end">Дії</th>
                    </tr>
                </thead>
                <tbody>
                    {% for book in books %}
                    <tr>
                        <td><strong>{{ book.title }}</strong></td>
                        <td>{{ book.author }}</td>
                        <td><span class="badge bg-secondary">{{ book.published_year }}</span></td>
                        <td>{{ book.genre }}</td>
                        <td class="text-end">
                            <a href="{% url 'edit_book' book.id %}" class="btn btn-sm btn-outline-primary">Редагувати</a>
                            <a href="{% url 'delete_book' book.id %}" class="btn btn-sm btn-outline-danger">Видалити</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="5" class="text-center text-muted">Книг поки що немає. Будьте першим, хто додасть!</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
