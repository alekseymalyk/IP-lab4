<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Видалити книгу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { max-width: 500px; margin: 100px auto; border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card p-4 text-center">
        <h2 class="text-danger mb-4">⚠️ Видалення книги</h2>
        <p class="mb-4">Ви впевнені, що хочете видалити книгу <strong>"{{ book.title }}"</strong>?<br>Цю дію неможливо буде скасувати.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'book_list' %}" class="btn btn-outline-secondary">Скасувати</a>
                <button type="submit" class="btn btn-danger">Так, видалити</button>
            </div>
        </form>
    </div>
</body>
</html>
