{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% translate "Видалити книгу" %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .delete-card {
            background: white;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .icon-warning {
            font-size: 4rem;
            color: #ef4444;
            margin-bottom: 1.5rem;
        }
        .btn-custom {
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
    </style>
</head>
<body>
    <div class="delete-card">
        <div class="icon-warning">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <h2 class="fw-bold mb-3">{% translate "Видалення книги" %}</h2>
        <p class="text-muted mb-4">
            {% translate "Ви впевнені, що хочете видалити книгу" %} 
            <strong class="text-dark">"{{ book.title }}"</strong>?<br>
            <span class="small">{% translate "Цю дію неможливо буде скасувати." %}</span>
        </p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'book_list' %}" class="btn btn-light btn-custom">
                    {% translate "Скасувати" %}
                </a>
                <button type="submit" class="btn btn-danger btn-custom shadow-sm">
                    {% translate "Так, видалити" %}
                </button>
            </div>
        </form>
    </div>
</body>
</html>
