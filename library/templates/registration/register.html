{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% translate "Реєстрація" %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-card {
            background: white;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }
        .btn-success-custom {
            background-color: #10b981;
            border: none;
            padding: 0.8rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-success-custom:hover {
            background-color: #059669;
            transform: translateY(-1px);
        }
        .form-control {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            margin-bottom: 1rem;
        }
        .logo-icon {
            font-size: 2.5rem;
            color: #10b981;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="register-card text-center">
        <div class="logo-icon">
            <i class="bi bi-person-plus-fill"></i>
        </div>
        <h2 class="fw-bold mb-2">{% translate "Реєстрація" %}</h2>
        <p class="text-muted mb-4 small">{% translate "Створіть свій акаунт за лічені секунди" %}.</p>
        
        <form method="post" class="text-start">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success-custom w-100 text-white mt-3">
                {% translate "Зареєструватися" %}
            </button>
        </form>
        
        <div class="mt-4 pt-3 border-top">
            <p class="small text-muted mb-0">
                {% translate "Вже є акаунт?" %} 
                <a href="{% url 'login' %}" class="text-success fw-semibold text-decoration-none">
                    {% translate "Увійти" %}
                </a>
            </p>
        </div>
    </div>
</body>
</html>
